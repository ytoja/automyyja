<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ammatillinen viestintä — Automyyjä</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#0a1520;--bg2:#12202e;--bg3:#1a2d3e;
  --accent:#e63946;--accent2:#f4a261;--gold:#ffd166;
  --glass:rgba(255,255,255,0.06);--glassborder:rgba(255,255,255,0.12);
  --text:#f0f4f8;--muted:#7a92a8;--success:#2dd4bf;--error:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);
  min-height:100vh;font-family:'Nunito',sans-serif;color:var(--text);
  overflow-x:hidden;
}
/* Diagonal pattern overlay */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(
    -55deg,transparent,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px
  );pointer-events:none;z-index:0;
}

/* ── HEADER ── */
.header{
  position:relative;z-index:1;
  background:linear-gradient(90deg,rgba(230,57,70,0.15),rgba(244,162,97,0.08));
  border-bottom:1px solid rgba(230,57,70,0.3);
  padding:18px 32px;display:flex;align-items:center;gap:20px;
}
.header-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;
  font-weight:700;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:1.7rem;
  font-weight:800;letter-spacing:2px;line-height:1}
.header-sub{font-size:.75rem;color:var(--muted);letter-spacing:1.5px;margin-top:2px}
.header-score{margin-left:auto;text-align:right}
.score-num{font-family:'Barlow Condensed',sans-serif;font-size:2rem;
  font-weight:800;color:var(--gold);line-height:1}
.score-lbl{font-size:.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

/* Progress bar */
.progress-wrap{height:3px;background:rgba(255,255,255,0.06)}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .4s ease}

/* ── MAIN ── */
.main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:28px 20px 60px}

/* Module nav */
.mod-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.mod-btn{
  padding:6px 14px;border-radius:20px;border:1px solid var(--glassborder);
  background:var(--glass);font-family:'Nunito',sans-serif;font-size:.75rem;
  font-weight:700;color:var(--muted);cursor:pointer;letter-spacing:.5px;
  transition:all .2s;backdrop-filter:blur(8px);
}
.mod-btn:hover{border-color:var(--accent);color:var(--text)}
.mod-btn.active{background:rgba(230,57,70,0.2);border-color:var(--accent);color:var(--accent)}
.mod-btn.done{background:rgba(45,212,191,0.1);border-color:var(--success);color:var(--success)}

/* ── TASK CARD ── */
.task-card{
  background:var(--glass);border:1px solid var(--glassborder);
  border-radius:16px;padding:28px 32px;backdrop-filter:blur(16px);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
  animation:slideIn .35s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes glow{0%{box-shadow:0 0 0 rgba(45,212,191,0)}50%{box-shadow:0 0 30px rgba(45,212,191,0.4)}100%{box-shadow:0 0 0 rgba(45,212,191,0)}}
.shake{animation:shake .4s ease}
.glow-success{animation:glow .6s ease}

.task-type{font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent2);margin-bottom:6px}
.task-num{font-size:.65rem;color:var(--muted);float:right;letter-spacing:1px}
.task-title{font-family:'Barlow Condensed',sans-serif;font-size:1.55rem;
  font-weight:700;letter-spacing:1px;margin-bottom:6px;line-height:1.2}
.task-instruction{font-size:.88rem;color:var(--muted);margin-bottom:22px;line-height:1.5}

/* Context box (email/message display) */
.context-box{
  background:rgba(0,0,0,0.3);border-left:3px solid var(--accent);
  border-radius:0 10px 10px 0;padding:16px 20px;margin-bottom:22px;
  font-size:.9rem;line-height:1.7;
}
.ctx-header{font-size:.65rem;color:var(--muted);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06);
  padding-bottom:8px;display:flex;gap:16px}
.ctx-label{color:var(--accent2)}

/* ── T1: KORJAA VIRHEET ── */
.error-text{font-size:.95rem;line-height:2;cursor:default}
.word-btn{
  display:inline;background:none;border:none;color:inherit;font:inherit;
  cursor:pointer;padding:1px 2px;border-radius:3px;transition:all .15s;
}
.word-btn:hover{background:rgba(230,57,70,0.2);color:var(--error)}
.word-btn.marked-wrong{background:rgba(230,57,70,0.25);color:var(--error);
  text-decoration:underline wavy var(--error)}
.word-btn.confirmed-error{background:rgba(230,57,70,0.3);color:var(--error);
  font-weight:700;border-bottom:2px solid var(--error)}
.word-btn.false-positive{background:rgba(248,113,113,0.15);color:var(--error)}
.word-btn.correct-find{background:rgba(45,212,191,0.2);color:var(--success);font-weight:700}

/* ── T2: JÄRJESTÄ LAUSE ── */
.word-pool{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;
  padding:12px;border:1px dashed var(--glassborder);border-radius:10px;margin-bottom:14px}
.answer-slots{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;
  padding:12px;background:rgba(0,0,0,0.2);border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);margin-bottom:14px}
.word-chip{
  padding:7px 14px;background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.3);
  border-radius:20px;font-size:.85rem;font-weight:600;cursor:grab;
  user-select:none;transition:all .15s;white-space:nowrap;
}
.word-chip:hover{background:rgba(230,57,70,0.3);transform:translateY(-2px)}
.word-chip.in-answer{background:rgba(244,162,97,0.15);border-color:rgba(244,162,97,0.4);cursor:grab}
.word-chip.dragging{opacity:0.4}
.slot-placeholder{padding:7px 14px;border:1px dashed rgba(255,255,255,0.15);
  border-radius:20px;font-size:.8rem;color:var(--muted);font-style:italic}

/* ── T3: TÄYDENNÄ ── */
.fill-text{font-size:.95rem;line-height:2.2}
.blank-select{
  background:rgba(230,57,70,0.12);border:1px solid rgba(230,57,70,0.4);
  border-radius:6px;color:var(--text);font-family:'Nunito',sans-serif;
  font-size:.9rem;padding:3px 8px;cursor:pointer;outline:none;
  transition:all .2s;
}
.blank-select:focus{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(244,162,97,0.2)}
.blank-select.correct{border-color:var(--success);background:rgba(45,212,191,0.15);color:var(--success)}
.blank-select.wrong{border-color:var(--error);background:rgba(248,113,113,0.15);color:var(--error)}

/* ── T4: AMMATTISANASTO ── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-term{
  padding:10px 16px;background:rgba(230,57,70,0.12);
  border:1px solid rgba(230,57,70,0.25);border-radius:10px;
  font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;
  text-align:center;
}
.match-term:hover,.match-term.selected{background:rgba(230,57,70,0.3);border-color:var(--accent);color:#fff}
.match-term.matched{background:rgba(45,212,191,0.15);border-color:var(--success);
  color:var(--success);cursor:default;pointer-events:none}
.match-def{
  padding:10px 16px;background:rgba(255,255,255,0.04);
  border:1px solid var(--glassborder);border-radius:10px;
  font-size:.82rem;color:var(--muted);cursor:pointer;transition:all .2s;
}
.match-def:hover,.match-def.selected{background:rgba(244,162,97,0.12);
  border-color:var(--accent2);color:var(--text)}
.match-def.matched{background:rgba(45,212,191,0.1);border-color:var(--success);
  color:var(--success);cursor:default;pointer-events:none}

/* ── T5: MUOTOILE ── */
.rewrite-input{
  width:100%;min-height:110px;background:rgba(0,0,0,0.3);
  border:1px solid var(--glassborder);border-radius:10px;
  color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;
  padding:14px 16px;resize:vertical;outline:none;line-height:1.6;
  transition:border-color .2s;
}
.rewrite-input:focus{border-color:rgba(244,162,97,0.5)}
.rewrite-input.correct{border-color:var(--success)}
.checklist{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.check-item{display:flex;align-items:center;gap:8px;font-size:.8rem;
  color:var(--muted);padding:6px 10px;border-radius:6px;background:rgba(255,255,255,0.03)}
.check-item.ok{color:var(--success);background:rgba(45,212,191,0.08)}
.check-item.fail{color:var(--error);background:rgba(248,113,113,0.08)}
.check-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── T6: OIKEIN/VÄÄRIN ── */
.statement-box{
  padding:18px 22px;background:rgba(0,0,0,0.25);border-radius:12px;
  font-size:1rem;line-height:1.5;margin-bottom:18px;border-left:3px solid var(--accent2);
}
.ov-btns{display:flex;gap:12px;margin-bottom:16px}
.ov-btn{
  flex:1;padding:12px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;
  font-size:1.1rem;font-weight:700;letter-spacing:1px;border:1px solid var(--glassborder);
  background:var(--glass);color:var(--text);cursor:pointer;transition:all .2s;
}
.ov-btn:hover{transform:translateY(-2px)}
.ov-btn.oikein:hover{border-color:var(--success);background:rgba(45,212,191,0.1);color:var(--success)}
.ov-btn.vaarin:hover{border-color:var(--error);background:rgba(248,113,113,0.1);color:var(--error)}
.ov-btn.selected-right{background:rgba(45,212,191,0.2);border-color:var(--success);color:var(--success)}
.ov-btn.selected-wrong{background:rgba(248,113,113,0.15);border-color:var(--error);color:var(--error)}

/* ── FEEDBACK ── */
.feedback{
  margin-top:18px;padding:14px 18px;border-radius:10px;font-size:.88rem;
  line-height:1.55;display:none;
}
.feedback.show{display:block}
.feedback.ok{background:rgba(45,212,191,0.1);border:1px solid rgba(45,212,191,0.3);color:var(--success)}
.feedback.fail{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);color:#fca5a5}
.feedback-title{font-weight:700;margin-bottom:4px}
.correct-answer{margin-top:8px;padding:8px 12px;background:rgba(0,0,0,0.2);
  border-radius:6px;color:var(--text);font-size:.85rem}

/* ── BUTTONS ── */
.btn{
  padding:11px 28px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;
  font-size:1rem;font-weight:700;letter-spacing:1.5px;border:none;cursor:pointer;
  transition:all .2s;text-transform:uppercase;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c1121f);color:#fff;
  box-shadow:0 4px 16px rgba(230,57,70,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(230,57,70,0.4)}
.btn-secondary{background:var(--glass);border:1px solid var(--glassborder);color:var(--muted)}
.btn-secondary:hover{border-color:var(--text);color:var(--text)}
.btn-row{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}

/* ── RESULTS ── */
.results-card{text-align:center;padding:40px 32px}
.results-icon{font-size:4rem;margin-bottom:16px}
.results-title{font-family:'Barlow Condensed',sans-serif;font-size:2.5rem;
  font-weight:800;letter-spacing:2px;margin-bottom:8px}
.results-score{font-size:4rem;font-weight:800;color:var(--gold);
  font-family:'Barlow Condensed',sans-serif;line-height:1}
.results-sub{color:var(--muted);margin-top:8px;font-size:.9rem}
.results-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  margin:24px 0;text-align:center}
.breakdown-item{background:rgba(0,0,0,0.2);border-radius:10px;padding:14px 10px}
.breakdown-num{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;
  font-weight:800;color:var(--accent2)}
.breakdown-lbl{font-size:.7rem;color:var(--muted);letter-spacing:.5px}
.save-status{margin-top:16px;font-size:.8rem;color:var(--muted);min-height:20px}

/* ── INTRO ── */
.intro-card{text-align:center;padding:40px 32px}
.intro-badge{display:inline-block;padding:6px 18px;background:rgba(230,57,70,0.15);
  border:1px solid rgba(230,57,70,0.3);border-radius:20px;font-size:.7rem;
  font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
.intro-title{font-family:'Barlow Condensed',sans-serif;font-size:2.8rem;
  font-weight:800;letter-spacing:2px;line-height:1.1;margin-bottom:16px}
.intro-title span{color:var(--accent)}
.intro-desc{color:var(--muted);font-size:.95rem;line-height:1.7;
  max-width:560px;margin:0 auto 28px}
.intro-modules{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
  max-width:500px;margin:0 auto 28px;text-align:left}
.intro-mod{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid var(--glassborder)}
.intro-mod-icon{font-size:1.3rem}
.intro-mod-text{font-size:.82rem;font-weight:600}
.intro-mod-sub{font-size:.7rem;color:var(--muted)}

/* Name input */
.name-input{
  width:100%;max-width:340px;background:rgba(0,0,0,0.3);
  border:1px solid var(--glassborder);border-radius:10px;
  color:var(--text);font-family:'Nunito',sans-serif;font-size:1rem;
  padding:12px 16px;outline:none;text-align:center;
  transition:border-color .2s;
}
.name-input:focus{border-color:var(--accent2)}

@media(max-width:600px){
  .match-grid{grid-template-columns:1fr}
  .results-breakdown{grid-template-columns:repeat(2,1fr)}
  .intro-modules{grid-template-columns:1fr}
  .header{padding:14px 16px}
  .task-card{padding:20px 18px}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">🚗 AutoAkatemia</div>
    <div class="header-title">AMMATILLINEN VIESTINTÄ</div>
    <div class="header-sub">AUTOMYYJÄN KIELENHUOLTO</div>
  </div>
  <div class="header-score">
    <div class="score-num" id="score-disp">0</div>
    <div class="score-lbl">pistettä</div>
  </div>
</div>
<div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>

<div class="main">
  <div class="mod-nav" id="mod-nav"></div>
  <div id="task-area"></div>
</div>

<script>
'use strict';
// ══════════════════════════════════════════════════════
//  POWER AUTOMATE
// ══════════════════════════════════════════════════════
const PA_URL = 'https://default8fce65e3c62d4510b526ea15adf6e1.84.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2c49c9ed4b284c2f927a15eebb0d806e/triggers/manual/paths/invoke?api-version=1';

async function saveResults(){
  try{
    const sc = (type) => STATE.tasks.filter(t=>t.type===type&&t.correct).length+'/'+STATE.tasks.filter(t=>t.type===type).length;
    await fetch(PA_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        koodi:            STATE.name,
        pisteet:          STATE.score,
        oikein:           STATE.tasks.filter(t=>t.correct).length,
        bestStreak:       STATE.maxScore,
        korjaa_virheet:   sc('korjaa'),
        jarjesta_lause:   sc('jarjesta'),
        taydenna_viesti:  sc('taydenna'),
        ammattisanasto:   sc('sanasto'),
        muotoile_viesti:  sc('muotoile'),
        oikein_vaarin:    sc('oikein'),
        paivitetty:       new Date().toLocaleString('fi-FI'),
      })
    });
    return true;
  }catch(e){ return false; }
}

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let STATE = {
  phase: 'intro', // intro | task | results
  name: '',
  score: 0,
  maxScore: 0,
  taskIdx: 0,
  tasks: [],
  dragItem: null,
  matchSel: {term:null, def:null},
};

// ══════════════════════════════════════════════════════
//  TASK DATA — 24 tehtävää, 6 tyyppiä × 4
// ══════════════════════════════════════════════════════
const TASKS = [

// ── T1: KORJAA VIRHEET (4) ──
{
  type:'korjaa', points:8,
  label:'Korjaa virheet',
  title:'Etsi kirjoitusvirheet',
  instruction:'Klikkaa kaikki virheelliset sanat tekstistä. Löydät 4 virhettä.',
  context:{
    from:'Asiakaspalvelu',to:'Matti Virtanen',
    subject:'Koeajovahvistus — Toyota Corolla',
    body:'Hyvä Matti virtanen, Kiitos yhteydenotostanne. Vahvistamme koeajon ajalle tiistai 14. tammikuuta kello 14:00. Meiltä löytyy teihin sopiva auto ja tarjomme teille myös rahoitusvaihtoehtoja. Ystävällisesti, Autoliike Nopea'
  },
  errors:['virtanen','kiitos','teihin','tarjomme'],
  errorInfo:{
    'virtanen':'Sukunimi kirjoitetaan isolla alkukirjaimella: "Virtanen"',
    'kiitos':'Pilkun jälkeen lause jatkuu pienellä kirjaimella: "kiitos yhteydenotostanne"',
    'teihin':'Väärä sijamuoto — "teihin" ei sovi tähän. Oikein: "teille sopiva auto" (allatiivi)',
    'tarjomme':'"tarjomme" on virheellinen — oikein: "tarjoamme"',
  }
},
{
  type:'korjaa', points:8,
  label:'Korjaa virheet',
  title:'Tekstiviestin tarkistus',
  instruction:'Automyyjä lähettää viestin asiakkaalle. Löydä 3 virhettä — joukossa on myös kielioppivirhe.',
  context:{
    from:'Myyjä Sari',to:'Asiakas',
    subject:'WhatsApp-viesti',
    body:'Hei Tiina Lönnberg. Otin lisätietoja Audin rahoituksesta teidän puolesta. Kuukausierä on noin 289 euroa ja leasing-sopimuksen pituus on kolme vuota. Laittakaa viestiä jos haluatte sopia tapamisen.'
  },
  errors:['puolesta','vuota','tapamisen'],
  errorInfo:{
    'puolesta':'Possessiivisuffiksi puuttuu — oikein: "teidän puolestanne" (ei "teidän puolesta")',
    'vuota':'"vuota" ei ole oikea sana — tarkoitetaan "vuotta"',
    'tapamisen':'"tapamisen" on väärässä muodossa — oikein: "tapaamisen"',
  }
},
{
  type:'korjaa', points:8,
  label:'Korjaa virheet',
  title:'Tarjouskirjeen tarkistus',
  instruction:'Tarkista tarjouskirje ennen lähetystä. Etsi 3 virhettä.',
  context:{
    from:'Automyyjä Juha',to:'Asiakas',
    subject:'Tarjous — Volkswagen Passat 2022',
    body:'Arvoisa asiakas, haluamme esitellä teille mainiota volkswagen passat -autoa vuosimallia 2022. Ajoneuvon hinta on 24 900 euroa. Vaihtoautonne voidaan ottaa vastaan vaihdossa. auto on huollettu säänöllisesti ja sillä on täysi huoltokirja.'
  },
  errors:['volkswagen','säänöllisesti','auto'],
  errorInfo:{
    'volkswagen':'Automerkin nimi kirjoitetaan isolla: "Volkswagen"',
    'säänöllisesti':'Kirjoitusvirhe — oikein: "säännöllisesti"',
    'auto':'Lauseen alussa oleva sana kirjoitetaan isolla alkukirjaimella: "Auto"',
  }
},
{
  type:'korjaa', points:8,
  label:'Korjaa virheet',
  title:'Sähköpostin kielenhuolto',
  instruction:'Etsi sähköpostista 3 kirjoitusvirhettä.',
  context:{
    from:'Myyntiassistentti',to:'Heikki Mäkinen',
    subject:'Vaihtoautonne arviointi',
    body:'Hyvä Heikki Mäkinen, Vaihtoautonne arviointi on nyt valmistu. Ajoneuvon arvoksi olemme arvioineet 8 500 euroa. Tämä summa voidaan käyttää uuden auton ostossa hinnan-alenuksena. Pyydämme teitä ottamaan yhteyttä mahdollisimman piaan.'
  },
  errors:['valmistu','hinnanalenuksena','piaan'],
  errorInfo:{

function startGame(){
  const n=document.getElementById('name-input').value.trim();
  if(!n){document.getElementById('name-input').style.borderColor='var(--error)';return;}
  STATE.name=n;
  STATE.phase='task';
  STATE.taskIdx=0;
  STATE.tasks=TASKS.map(t=>({...t,done:false,correct:false,score:0}));
  STATE.maxScore=TASKS.reduce((s,t)=>s+t.points,0);
  render();
}

function renderModNav(){
  const nav=document.getElementById('mod-nav');
  nav.innerHTML=STATE.tasks.map((t,i)=>`
    <div class="mod-btn${i===STATE.taskIdx?' active':t.done?(t.correct?' done':''):''}"
      onclick="jumpTo(${i})">${i+1}. ${t.label}</div>
  `).join('');
}

function jumpTo(i){
  STATE.taskIdx=i;
  renderTask();
}

function renderTask(){
  STATE.phase='task';
  // Reset per-task state on every render
  markedWords=new Set();
  matchState={selTerm:null,selDef:null,matched:new Set()};
  renderModNav();
  updateProgress();
  const t=STATE.tasks[STATE.taskIdx];
  const area=document.getElementById('task-area');
  if(t.type==='korjaa')   area.innerHTML=buildKorjaa(t);
  if(t.type==='jarjesta') area.innerHTML=buildJarjesta(t);
  if(t.type==='taydenna') area.innerHTML=buildTaydenna(t);
  if(t.type==='sanasto')  area.innerHTML=buildSanasto(t);
  if(t.type==='muotoile') area.innerHTML=buildMuotoile(t);
  if(t.type==='oikein')   area.innerHTML=buildOikeinVaarin(t);
  attachHandlers(t);
}

// ══════════════════════════════════════════════════════
//  T1: KORJAA VIRHEET
// ══════════════════════════════════════════════════════
function buildKorjaa(t){
  const words=t.context.body.split(/(\s+)/);
  const wordBtns=words.map((w,i)=>{
    if(/^\s+$/.test(w)) return w;
    const clean=w.toLowerCase().replace(/[^a-zäöå]/gi,'');
    return `<button class="word-btn" data-word="${clean}" data-idx="${i}" onclick="toggleWord(this,'${t.type}')">${w}</button>`;
  }).join('');
  return taskShell(t,`
    ${contextBox(t.context)}
    <div class="error-text" id="error-text">${wordBtns}</div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkKorjaa()">TARKISTA VASTAUKSET</button>
      <button class="btn btn-secondary" onclick="nextTask()">OHITA →</button>
    </div>`);
}

let markedWords=new Set();
function toggleWord(btn){
  const w=btn.dataset.word;
  if(markedWords.has(w)){ markedWords.delete(w); btn.classList.remove('marked-wrong'); }
  else { markedWords.add(w); btn.classList.add('marked-wrong'); }
}

function checkKorjaa(){
  const t=STATE.tasks[STATE.taskIdx];
  const errors=t.errors;
  const found=errors.filter(e=>markedWords.has(e));
  const fp=[...markedWords].filter(w=>!errors.includes(w));
  const score=Math.round(t.points*(found.length/errors.length)-fp.length*2);
  const finalScore=Math.max(0,score);
  if(!t.done){ t.done=true; t.correct=found.length===errors.length&&fp.length===0;
    t.score=finalScore; STATE.score+=finalScore; updateScoreDisp(); }

  // Highlight results
  document.querySelectorAll('.word-btn').forEach(btn=>{
    const w=btn.dataset.word;
    if(errors.includes(w)&&markedWords.has(w)) btn.className='word-btn correct-find';
    else if(errors.includes(w)&&!markedWords.has(w)) btn.className='word-btn confirmed-error';
    else if(!errors.includes(w)&&markedWords.has(w)) btn.className='word-btn false-positive';
  });

  let msg='';
  errors.forEach(e=>{ if(t.errorInfo[e]) msg+=`<br>• <b>${e}</b>: ${t.errorInfo[e]}`; });
  showFeedback(t.correct,
    t.correct?'Kaikki virheet löydetty!':'Osittain oikein — katso selitykset:',
    msg, finalScore, t.points);
}

// ══════════════════════════════════════════════════════
//  T2: JÄRJESTÄ LAUSE
// ══════════════════════════════════════════════════════
let jarjestaAnswer=[];
function buildJarjesta(t){
  jarjestaAnswer=[];
  const shuffled=shuffle(t.words);
  return taskShell(t,`
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:8px">Saatavilla olevat sanat:</p>
    <div class="word-pool" id="word-pool">
      ${shuffled.map(w=>`<div class="word-chip" draggable="true" data-word="${w}">${w}</div>`).join('')}
    </div>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:8px">Vastausjärjestys:</p>
    <div class="answer-slots" id="answer-slots"><span class="slot-placeholder">Vedä sanat tähän järjestykseen...</span></div>
    <div style="font-size:.75rem;color:var(--muted);margin-top:6px">💡 Vinkki: ${t.hint}</div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkJarjesta()">TARKISTA</button>
      <button class="btn btn-secondary" onclick="clearAnswer()">TYHJENNÄ</button>
      <button class="btn btn-secondary" onclick="nextTask()">OHITA →</button>
    </div>`);
}

function attachHandlers(t){
  if(t.type!=='jarjesta') return;
  document.querySelectorAll('.word-chip').forEach(chip=>{
    chip.addEventListener('dragstart',e=>{
      STATE.dragItem=chip;
      chip.classList.add('dragging');
    });
    chip.addEventListener('dragend',e=>chip.classList.remove('dragging'));
    chip.addEventListener('click',()=>moveChip(chip));
  });
  ['word-pool','answer-slots'].forEach(id=>{
    const el=document.getElementById(id);
    el.addEventListener('dragover',e=>e.preventDefault());
    el.addEventListener('drop',e=>{
      e.preventDefault();
      if(!STATE.dragItem) return;
      const placeholder=el.querySelector('.slot-placeholder');
      if(placeholder) placeholder.remove();
      el.appendChild(STATE.dragItem);
      STATE.dragItem.classList.toggle('in-answer', el.id==='answer-slots');
    });
  });
}

function moveChip(chip){
  const inAnswer=chip.classList.contains('in-answer');
  const target=document.getElementById(inAnswer?'word-pool':'answer-slots');
  const placeholder=target.querySelector('.slot-placeholder');
  if(placeholder) placeholder.remove();
  target.appendChild(chip);
  chip.classList.toggle('in-answer',!inAnswer);
}

function clearAnswer(){
  const pool=document.getElementById('word-pool');
  document.querySelectorAll('#answer-slots .word-chip').forEach(c=>{
    c.classList.remove('in-answer'); pool.appendChild(c);
  });
  const slots=document.getElementById('answer-slots');
  if(!slots.querySelector('.word-chip'))
    slots.innerHTML='<span class="slot-placeholder">Vedä sanat tähän järjestykseen...</span>';
}

function checkJarjesta(){
  const t=STATE.tasks[STATE.taskIdx];
  const chips=[...document.querySelectorAll('#answer-slots .word-chip')];
  if(chips.length===0){
    const fb=document.getElementById('feedback');
    fb.className='feedback fail show';
    fb.innerHTML='<div class="feedback-title">⚠️ Siirrä sanat ensin vastauskenttään!</div>';
    return;
  }
  const ans=chips.map(ch=>ch.dataset.word).join(' ');
  const correctStr=t.correctStr||(typeof t.correct==='string'?t.correct:TASKS[STATE.taskIdx].correct);
  const ok=ans.trim()===correctStr.trim();
  if(!t.done){
    // Save the answer string before overwriting
    t.correctStr=correctStr;
    t.done=true; t.correct=ok; t.score=ok?t.points:0;
    STATE.score+=t.score; updateScoreDisp();
  }
  showFeedback(ok,
    ok?'Täydellinen! Lauserakenne on oikein.':'Sanajärjestys ei ole oikein.',
    ok?'':`<div class="correct-answer">Oikea vastaus: <b>${correctStr}</b></div>`,
    t.score, t.points);
}

// ══════════════════════════════════════════════════════
//  T3: TÄYDENNÄ VIESTI
// ══════════════════════════════════════════════════════
function buildTaydenna(t){
  let html=t.template;
  t.blanks.forEach(b=>{
    const opts=shuffle([...b.options]); // use the blank's own options array directly
    const sel=`<select class="blank-select" id="blank-${b.id}" onchange="checkBlank('${b.id}')">
      <option value="">— valitse —</option>
      ${opts.map(o=>`<option value="${o}">${o}</option>`).join('')}
    </select>`;
    html=html.replace(`[${b.id}]`,sel);
  });
  return taskShell(t,`
    <div class="fill-text context-box">${html}</div>
    <div id="blank-feedbacks"></div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkTaydenna()">TARKISTA KAIKKI</button>
      <button class="btn btn-secondary" onclick="nextTask()">OHITA →</button>
    </div>`);
}

function checkBlank(id){
  const t=STATE.tasks[STATE.taskIdx];
  const blank=t.blanks.find(b=>b.id===id);
  const sel=document.getElementById(`blank-${id}`);
  if(!sel||!sel.value) return;
  sel.classList.remove('correct','wrong');
  sel.classList.add(sel.value===blank.correct?'correct':'wrong');
}

function checkTaydenna(){
  const t=STATE.tasks[STATE.taskIdx];
  let correct=0;
  let fb='';
  t.blanks.forEach(b=>{
    const sel=document.getElementById(`blank-${b.id}`);
    checkBlank(b.id);
    if(sel&&sel.value===b.correct){ correct++; }
    else fb+=`<br>• Kohta <b>${b.id}</b>: ${b.explanation}`;
  });
  const score=Math.round(t.points*(correct/t.blanks.length));
  if(!t.done){ t.done=true; t.correct=correct===t.blanks.length; t.score=score;
    STATE.score+=score; updateScoreDisp(); }
  showFeedback(t.correct,
    t.correct?'Kaikki valinnat oikein!':'Osittain oikein:', fb, score, t.points);
}

// ══════════════════════════════════════════════════════
//  T4: AMMATTISANASTO
// ══════════════════════════════════════════════════════
let matchState={selTerm:null,selDef:null,matched:new Set()};
function buildSanasto(t){
  matchState={selTerm:null,selDef:null,matched:new Set()};
  const shuffledDefs=shuffle(t.pairs.map(p=>p.def));
  return taskShell(t,`
    <div class="match-grid">
      <div class="match-col" id="terms-col">
        ${t.pairs.map((p,i)=>`<div class="match-term" id="term-${i}" onclick="selectTerm(${i},'${p.term}')">${p.term}</div>`).join('')}
      </div>
      <div class="match-col" id="defs-col">
        ${shuffledDefs.map((d,i)=>`<div class="match-def" id="def-${i}" onclick="selectDef(${i},'${d.replace(/'/g,"&#39;")}')">${d}</div>`).join('')}
      </div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="nextTask()">OHITA →</button></div>`);
}

function selectTerm(idx,term){
  if(matchState.matched.has('t'+idx)) return;
  document.querySelectorAll('.match-term').forEach(el=>el.classList.remove('selected'));
  document.getElementById('term-'+idx).classList.add('selected');
  matchState.selTerm={idx,term};
  tryMatch();
}

function selectDef(idx,def){
  if(matchState.matched.has('d'+idx)) return;
  document.querySelectorAll('.match-def').forEach(el=>el.classList.remove('selected'));
  document.getElementById('def-'+idx).classList.add('selected');
  matchState.selDef={idx,def};
  tryMatch();
}

function tryMatch(){
  if(!matchState.selTerm||!matchState.selDef) return;
  const t=STATE.tasks[STATE.taskIdx];
  const pair=t.pairs.find(p=>p.term===matchState.selTerm.term);
  if(pair&&pair.def===matchState.selDef.def){
    // Correct match
    document.getElementById('term-'+matchState.selTerm.idx).classList.add('matched');
    document.getElementById('def-'+matchState.selDef.idx).classList.add('matched');
    matchState.matched.add('t'+matchState.selTerm.idx);
    matchState.matched.add('d'+matchState.selDef.idx);
    matchState.selTerm=null; matchState.selDef=null;
    if(matchState.matched.size===t.pairs.length*2){
      t.done=true; t.correct=true; t.score=t.points;
      STATE.score+=t.points; updateScoreDisp();
      showFeedback(true,'Kaikki termit yhdistetty oikein!','',t.points,t.points);
    }
  } else {
    // Wrong
    const te=document.getElementById('term-'+matchState.selTerm.idx);
    const de=document.getElementById('def-'+matchState.selDef.idx);
    te.classList.add('shake'); de.classList.add('shake');
    setTimeout(()=>{ te.classList.remove('shake','selected'); de.classList.remove('shake','selected'); },500);
    matchState.selTerm=null; matchState.selDef=null;
    STATE.score=Math.max(0,STATE.score-1); updateScoreDisp();
  }
}

// ══════════════════════════════════════════════════════
//  T5: MUOTOILE VIESTI
// ══════════════════════════════════════════════════════
function buildMuotoile(t){
  return taskShell(t,`
    <div class="context-box">
      <div class="ctx-header"><span class="ctx-label">EPÄMUODOLLINEN VERSIO (älä kopioi):</span></div>
      <div style="color:var(--error);font-style:italic">"${t.informal}"</div>
    </div>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:8px">Kirjoita ammattimainen versio:</p>
    <textarea class="rewrite-input" id="rewrite-input" placeholder="Hyvä asiakas, ..."></textarea>
    <div class="checklist" id="checklist">
      ${t.checks.map(c=>`<div class="check-item" id="chk-${c.id}">
        <div class="check-dot"></div><span>${c.label}</span>
      </div>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkMuotoile()">TARKISTA</button>
      <button class="btn btn-secondary" onclick="showModel()">NÄYTÄ MALLIVASTAUS</button>
      <button class="btn btn-secondary" onclick="nextTask()">OHITA →</button>
    </div>`);
}

function checkMuotoile(){
  const t=STATE.tasks[STATE.taskIdx];
  const val=document.getElementById('rewrite-input').value;
  let passed=0;
  t.checks.forEach(c=>{
    const ok=c.regex.test(val);
    const el=document.getElementById('chk-'+c.id);
    if(el){ el.classList.toggle('ok',ok); el.classList.toggle('fail',!ok);
      el.querySelector('.check-dot').textContent=ok?'✓':'✗'; }
    if(ok) passed++;
  });
  const score=Math.round(t.points*(passed/t.checks.length));
  if(!t.done){ t.done=true; t.correct=passed===t.checks.length; t.score=score;
    STATE.score+=score; updateScoreDisp(); }
  showFeedback(t.correct,
    t.correct?'Erinomainen! Kaikki vaatimukset täyttyvät.':
    `${passed}/${t.checks.length} vaatimusta täyttyy — katso puuttuvat kohdat listalta.`,
    '', score, t.points);
}

function showModel(){
  const t=STATE.tasks[STATE.taskIdx];
  const fb=document.getElementById('feedback');
  fb.className='feedback fail show';
  fb.innerHTML=`<div class="feedback-title">📝 Mallivastaus:</div>
    <div class="correct-answer">${t.model}</div>`;
}

// ══════════════════════════════════════════════════════
//  T6: OIKEIN / VÄÄRIN
// ══════════════════════════════════════════════════════
function buildOikeinVaarin(t){
  return taskShell(t,`
    <div class="statement-box">"${t.statement}"</div>
    <div class="ov-btns">
      <button class="ov-btn oikein" onclick="checkOV(true)">✓ OIKEIN</button>
      <button class="ov-btn vaarin" onclick="checkOV(false)">✗ VÄÄRIN</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="nextTask()">OHITA →</button></div>`);
}

function checkOV(answer){
  const t=STATE.tasks[STATE.taskIdx];
  const ok=answer===t.correct;
  if(!t.done){ t.done=true; t.correct=ok; t.score=ok?t.points:0;
    STATE.score+=t.score; updateScoreDisp(); }
  document.querySelectorAll('.ov-btn').forEach(b=>b.disabled=true);
  const correctBtn=document.querySelector('.ov-btn.'+(t.correct?'oikein':'vaarin'));
  if(correctBtn) correctBtn.classList.add(t.correct?'selected-right':'selected-wrong');
  showFeedback(ok,
    ok?'Oikein! Hyvä arvio.':'Väärä vastaus.',
    `<div class="correct-answer">${t.explanation}</div>`,
    t.score, t.points);
}

// ══════════════════════════════════════════════════════
//  SHARED HELPERS
// ══════════════════════════════════════════════════════
function taskShell(t,body){
  const idx=STATE.taskIdx;
  return `<div class="task-card" id="task-card">
    <div class="task-type">${t.label} <span class="task-num">${idx+1} / ${STATE.tasks.length}</span></div>
    <div class="task-title">${t.title}</div>
    <div class="task-instruction">${t.instruction}</div>
    ${body}
  </div>`;
}

function contextBox(ctx){
  if(!ctx) return '';
  return `<div class="context-box">
    <div class="ctx-header">
      <span><span class="ctx-label">Lähettäjä:</span> ${ctx.from}</span>
      <span><span class="ctx-label">Vastaanottaja:</span> ${ctx.to}</span>
    </div>
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:10px">
      <span class="ctx-label">Aihe:</span> ${ctx.subject}
    </div>
    <div>${ctx.body}</div>
  </div>`;
}

function showFeedback(ok,title,detail,score,max){
  const fb=document.getElementById('feedback');
  if(!fb) return;
  fb.className='feedback '+(ok?'ok':'fail')+' show';
  const card=document.getElementById('task-card');
  if(card) card.classList.add(ok?'glow-success':'shake');
  fb.innerHTML=`<div class="feedback-title">${ok?'✅':'❌'} ${title} — ${score}/${max} pistettä</div>${detail}`;
  // Auto-show next button
  const btnRow=document.querySelector('.btn-row');
  if(btnRow&&!btnRow.querySelector('.btn-next')){
    const nb=document.createElement('button');
    nb.className='btn btn-primary btn-next';
    nb.textContent=STATE.taskIdx<STATE.tasks.length-1?'SEURAAVA TEHTÄVÄ →':'KATSO TULOKSET →';
    nb.onclick=nextTask;
    btnRow.prepend(nb);
  }
  renderModNav();
}

function nextTask(){
  if(STATE.taskIdx>=STATE.tasks.length-1){
    STATE.phase='results'; render();
  } else {
    STATE.taskIdx++;
    markedWords=new Set();
    renderTask();
  }
}

function updateProgress(){
  const pct=(STATE.taskIdx/STATE.tasks.length)*100;
  document.getElementById('prog-bar').style.width=pct+'%';
}

function updateScoreDisp(){
  document.getElementById('score-disp').textContent=STATE.score;
}

// ══════════════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════════════
function renderResults(){
  document.getElementById('mod-nav').innerHTML='';
  document.getElementById('prog-bar').style.width='100%';
  const done=STATE.tasks.filter(t=>t.done);
  const correct=STATE.tasks.filter(t=>t.correct).length;
  const pct=Math.round(STATE.score/STATE.maxScore*100);
  const grade=pct>=90?'Erinomainen 🏆':pct>=75?'Hyvä 👍':pct>=60?'Tyydyttävä ✓':'Harjoittele lisää 📚';
  const icon=pct>=75?'🎉':pct>=60?'📊':'📚';

  document.getElementById('task-area').innerHTML=`
  <div class="task-card results-card">
    <div class="results-icon">${icon}</div>
    <div class="results-title">${grade}</div>
    <div class="results-score">${STATE.score}</div>
    <div class="results-sub">/ ${STATE.maxScore} pistettä (${pct}%)</div>
    <div class="results-breakdown">
      <div class="breakdown-item"><div class="breakdown-num">${correct}</div><div class="breakdown-lbl">Oikein</div></div>
      <div class="breakdown-item"><div class="breakdown-num">${done.length-correct}</div><div class="breakdown-lbl">Virheellisesti</div></div>
      <div class="breakdown-item"><div class="breakdown-num">${STATE.tasks.length-done.length}</div><div class="breakdown-lbl">Ohitettu</div></div>
    </div>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:20px">
      Opiskelija: <b style="color:var(--text)">${STATE.name}</b>
    </p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-primary" onclick="saveAndFinish()">💾 TALLENNA TULOKSET</button>
      <button class="btn btn-secondary" onclick="location.reload()">🔄 ALOITA ALUSTA</button>
    </div>
    <div class="save-status" id="save-status"></div>
  </div>`;
}

async function saveAndFinish(){
  document.getElementById('save-status').textContent='Tallennetaan...';
  const ok=await saveResults();
  document.getElementById('save-status').textContent=ok?'✅ Tulokset tallennettu opettajalle!':'⚠ Tallennus epäonnistui — ota kuvakaappaus tuloksista.';
}

// ══════════════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
